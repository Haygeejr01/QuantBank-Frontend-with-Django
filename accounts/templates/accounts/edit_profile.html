{% extends 'accounts/dashboard_layout.html' %}

{% block dashboard_title %}Edit profile{% endblock %}
{% block page_kicker %}Profile{% endblock %}
{% block page_title %}Edit details{% endblock %}

{% block dashboard_content %}
<section class="lp-panel lp-form-panel">
    <form method="POST">
        {% csrf_token %}
        <div class="lp-two-col">
            <label class="lp-field">First name
                <input type="text" name="first_name" value="{{ user.first_name }}">
            </label>
            <label class="lp-field">Last name
                <input type="text" name="last_name" value="{{ user.last_name }}">
            </label>
        </div>
        <label class="lp-field">Email
            <input type="email" name="email" value="{{ user.email }}">
        </label>
        <label class="lp-field">Phone number
            <input type="text" name="phone_number" value="{{ user.security_profile.phone_number }}" placeholder="+234">
        </label>
        <div class="lp-inline-actions">
            <button type="submit" class="lp-btn lp-btn-primary">Save changes</button>
            <a href="{% url 'profile' %}" class="lp-btn lp-btn-light">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
