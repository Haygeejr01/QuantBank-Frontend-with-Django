<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JAMB CBT Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper glass">
        <div class="auth-card animate-fade">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your portal below</p>

            {% if error %}
            <div
                style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); padding: 0.75rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label>Portal Type</label>
                    <select name="user_type" class="form-input"
                        style="appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.5rem;">
                        <option value="student">Student Portal</option>
                        <option value="admin">Admin Portal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Registration Number / Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Enter your credentials" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In to
                    Portal</button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="{{ url_for('index') }}"
                    style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
